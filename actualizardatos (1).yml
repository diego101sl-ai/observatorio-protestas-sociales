# Robot de datos: ejecuta scripts/actualizar_datos.py cada hora
# y publica los resultados en la carpeta data/ del repositorio.

name: Actualizar datos de protestas

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: Generar datos desde GDELT y ACLED
        env:
          ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: python3 scripts/actualizar_datos.py
      - name: Publicar datos en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet && echo "Sin cambios" || (git commit -m "Actualizar datos de protestas" && git push)
